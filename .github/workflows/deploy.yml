name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  site:
    name: Build & Deploy Astro to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (Astro + Pagefind)
        run: npm run build
        env:
          PUBLIC_ADSENSE_CLIENT: ${{ secrets.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_ADSENSE_TOP: ${{ secrets.PUBLIC_ADSENSE_TOP }}
          PUBLIC_ADSENSE_MIDDLE: ${{ secrets.PUBLIC_ADSENSE_MIDDLE }}
          PUBLIC_ADSENSE_BOTTOM: ${{ secrets.PUBLIC_ADSENSE_BOTTOM }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=blogs-seo --branch=${{ github.ref_name }}

  worker:
    name: Deploy Decap OAuth Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/decap-oauth
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install worker deps
        run: npm install

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/decap-oauth
