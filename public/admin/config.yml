          - { label: "Avatar", name: "avatar", widget: "image", required: false }
      - { label: "Publish date", name: "publish_date", widget: "datetime" }
      - { label: "Updated date", name: "updated_date", widget: "datetime", required: false }
      - { label: "Canonical URL", name: "canonical_url", widget: "string", required: false }
      - { label: "No-index", name: "noindex", widget: "boolean", default: false }
      - { label: "Silo pillar?", name: "pillar", widget: "boolean", default: false }
      - { label: "Pillar of (slug)", name: "pillar_of", widget: "string", required: false }
      - { label: "Related (slugs)", name: "related", widget: "list", required: false, default: [] }
      - { label: "Tags", name: "tags", widget: "list", required: false, default: [] }
      - { label: "Ads enabled", name: "ad_slots_enabled", widget: "boolean", default: true }
      - { label: "Affiliate disclosure", name: "affiliate_disclosure", widget: "boolean", default: false }
      - label: "FAQ (Schema.org Rich Snippet)"
