backend:
  name: github
  repo: paulojrzti/blogs-seo
  branch: main
  base_url: https://decap-oauth.paulojrzti.workers.dev
  auth_endpoint: /auth
  commit_messages:
    create: 'content(cms): create "{{slug}}"'
    update: 'content(cms): update "{{slug}}"'
    delete: 'content(cms): delete "{{slug}}"'
    uploadMedia: 'content(cms): upload "{{path}}"'
    deleteMedia: 'content(cms): delete media "{{path}}"'

publish_mode: editorial_workflow
media_folder: "src/assets/images"
public_folder: "/src/assets/images"
site_url: https://blogs-seo.paulojrzti.workers.dev
display_url: https://blogs-seo.paulojrzti.workers.dev
logo_url: https://blogs-seo.paulojrzti.workers.dev/favicon.svg
locale: pt

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  # =========================================================
  # FINANCE — PT
  # =========================================================
  - name: "finance_pt"
    label: "Finanças (PT)"
    label_singular: "Post de Finanças (PT)"
    folder: "src/content/finance_pt"
    create: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{slug}}"
    preview_path: "pt/finance/{{category}}/{{slug}}"
    fields:
      - { label: "Idioma", name: "language", widget: "hidden", default: "pt" }
      - label: "Categoria"
        name: "category"
        widget: "select"
        options: ["investimentos", "renda-fixa", "renda-variavel", "cripto", "planejamento-financeiro"]
      - label: "Tradução de (slug EN)"
        name: "translation_of"
        widget: "relation"
        collection: "finance_en"
        search_fields: ["title", "slug"]
        value_field: "slug"
        display_fields: ["title"]
        required: false
      - { label: "Título", name: "title", widget: "string", pattern: ['.{10,70}', '10 a 70 caracteres'] }
      - { label: "Resumo (excerpt)", name: "excerpt", widget: "text", pattern: ['.{80,200}', '80 a 200 caracteres'] }
      - { label: "Imagem destacada", name: "featured_image", widget: "image" }
      - { label: "ALT da imagem", name: "featured_image_alt", widget: "string" }
      - { label: "SEO Title", name: "seo_title", widget: "string", pattern: ['.{10,60}', '10 a 60 caracteres'] }
      - { label: "SEO Description", name: "seo_description", widget: "text", pattern: ['.{120,160}', '120 a 160 caracteres'] }
      - { label: "Status", name: "status", widget: "select", options: ["draft", "published"], default: "draft" }
      - label: "Autor"
        name: "author"
        widget: "object"
        fields:
          - { label: "Nome", name: "name", widget: "string", default: "Equipe Editorial" }
          - { label: "URL", name: "url", widget: "string", required: false }
          - { label: "Avatar", name: "avatar", widget: "image", required: false }
      - { label: "Data de publicação", name: "publish_date", widget: "datetime" }
      - { label: "Data de atualização", name: "updated_date", widget: "datetime", required: false }
      - { label: "Canonical URL", name: "canonical_url", widget: "string", required: false }
      - { label: "No-index", name: "noindex", widget: "boolean", default: false }
      - { label: "É pilar do silo?", name: "pillar", widget: "boolean", default: false }
      - { label: "Pilar de (slug do pilar)", name: "pillar_of", widget: "string", required: false }
      - { label: "Relacionados (slugs)", name: "related", widget: "list", required: false, default: [] }
      - { label: "Tags", name: "tags", widget: "list", required: false, default: [] }
      - { label: "Ads habilitados", name: "ad_slots_enabled", widget: "boolean", default: true }
      - { label: "Disclosure de afiliados", name: "affiliate_disclosure", widget: "boolean", default: false }
      - label: "FAQ (Rich Snippet Schema.org)"
        name: "faq"
        widget: "list"
        required: false
        fields:
          - { label: "Pergunta", name: "question", widget: "string" }
          - { label: "Resposta", name: "answer", widget: "text" }
      - label: "CTA"
        name: "cta"
        widget: "object"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - label: "Conteúdo"
        name: "body"
        widget: "markdown"

  # =========================================================
  # FINANCE — EN
  # =========================================================
  - name: "finance_en"
    label: "Finance (EN)"
    label_singular: "Finance Post (EN)"
    folder: "src/content/finance_en"
