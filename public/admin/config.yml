    preview_path: "en/fitness/{{category}}/{{slug}}"
    fields:
      - label: "Language"
        name: "language"
        widget: "hidden"
        default: "en"

      - label: "Category"
        name: "category"
        widget: "select"
        hint: >
          Choose the category that best describes this article's topic.
          The category determines which section of the site the article is published in.
          If the category you need is not in the list, register it first under 'Categories'.
        options:
          - { label: "Training", value: "training" }
          - { label: "Nutrition", value: "nutrition" }
          - { label: "Hypertrophy (muscle gain)", value: "hypertrophy" }
          - { label: "Weight Loss", value: "weight-loss" }
          - { label: "Supplements", value: "supplements" }

      - label: "Translation of (Portuguese version)"
        name: "translation_of"
        widget: "relation"
        collection: "fitness_pt"
        search_fields: ["title", "slug"]
        value_field: "slug"
        display_fields: ["title"]
        required: false
        hint: >
          If this article is the English version of an existing Portuguese article,
          select the original article here. This helps Google understand they are the same content
          in different languages and improves international ranking. Leave blank if this is a new article.

      - label: "Article Title"
        name: "title"
        widget: "string"
        hint: >
          The main title of the article, shown at the top of the page and on social media.
          Keep it between 10 and 70 characters. Be direct and include the main keyword.
          Example: 'Complete Hypertrophy Guide: Science and Practice'.
        pattern: ['.{10,70}', 'Title must be between 10 and 70 characters']

      - label: "Article Summary (Excerpt)"
        name: "excerpt"
        widget: "text"
        hint: >
          A short summary shown in listing cards and social media previews.
          Explain in 1–2 sentences what the reader will learn. Keep it between 80 and 200 characters.
          Include the main keyword. Example: 'Scientific principles of muscle hypertrophy: progressive overload, volume, intensity, frequency and recovery with practical protocols.'
        pattern: ['.{80,200}', 'Excerpt must be between 80 and 200 characters']

      - label: "Cover Image"
        name: "featured_image"
        widget: "image"
        hint: >
          Main image displayed at the top of the post and in shared links.
          Use JPG or PNG images, at least 1200×630 pixels for good appearance on social media.
          Avoid images with too much text.

      - label: "Image Description (ALT text)"
        name: "featured_image_alt"
        widget: "string"
        hint: >
          Alternative text that describes the image for visually impaired users and for Google.
          Describe what is in the image objectively.
          Example: 'Athlete performing hypertrophy exercise at the gym'.
          Required for SEO and accessibility.

      - label: "SEO Title (shown on Google)"
        name: "seo_title"
        widget: "string"
        hint: >
          Title that appears in the browser tab and in Google search results — can differ from the article title.
          Ideal: between 50 and 60 characters. Include the main keyword near the beginning.
          Example: 'Hypertrophy Guide: Science-Backed Muscle Building'.
        pattern: ['.{10,60}', 'SEO title must be between 10 and 60 characters']

      - label: "SEO Description (Meta Description)"
        name: "seo_description"
        widget: "text"
        hint: >
          Text Google shows below the title in search results.
          This is your chance to convince the reader to click. Keep it between 120 and 160 characters.
          Include the keyword, explain the benefit and end with a call to action.
          Example: 'Learn the scientific principles of muscle hypertrophy: progressive overload, ideal volume, frequency and recovery, with practical protocols for every level.'
        pattern: ['.{120,160}', 'SEO description must be between 120 and 160 characters']

      - label: "Publication Status"
        name: "status"
        widget: "select"
        hint: >
          Draft: the article is being written and won't appear on the site.
          Published: the article is visible to all visitors.
          Always start as Draft and only switch to Published after review.
        options:
          - { label: "Draft (not published)", value: "draft" }
          - { label: "Published (visible on site)", value: "published" }
        default: "draft"

      - label: "Author"
        name: "author"
        widget: "object"
        hint: "Information about who wrote the article. The author name appears at the bottom of the post and helps build credibility (Google E-E-A-T)."
        fields:
          - label: "Author Name"
            name: "name"
            widget: "string"
            default: "Editorial Team"
            hint: "Full name or editorial name. Appears on the article page."
          - label: "Author Link (optional)"
            name: "url"
            widget: "string"
            required: false
            hint: "URL of the author's profile (LinkedIn, personal site, etc.). Leave blank if not available."
          - label: "Author Photo (optional)"
            name: "avatar"
            widget: "image"
            required: false
            hint: "Author profile photo. Recommended: square image, at least 200×200 pixels."

      - label: "Publication Date"
        name: "publish_date"
        widget: "datetime"
        hint: "Date when the article was or will be published. Shown on the post and used by Google to order recent content."

      - label: "Last Updated Date (optional)"
        name: "updated_date"
        widget: "datetime"
        required: false
        hint: "If the article was revised or updated, enter the date of the latest version here. Updated articles tend to rank better."

      - label: "Canonical URL (optional — advanced)"
        name: "canonical_url"
        widget: "string"
        required: false
        hint: >
          Leave blank in most cases — the site sets this automatically.
          Only fill in if this article was originally published on another site
          and you want to tell Google which is the 'official' address of the content.

      - label: "Hide from Google (No-index)"
        name: "noindex"
        widget: "boolean"
        default: false
        hint: >
          When enabled, tells Google NOT to index this article (it won't appear in search results).
          Use only for drafts, internal pages or content that should not appear on Google.
          In most cases, leave DISABLED.

      - label: "Is this the pillar article of the category?"
        name: "pillar"
        widget: "boolean"
        default: false
        hint: >
          Pillar articles are the most complete guides on a topic — the reference content for a category.
          Each category should have only ONE pillar article.
          Enable this for the main article and leave disabled for others.

      - label: "Child of pillar (pillar article slug)"
        name: "pillar_of"
        widget: "string"
        required: false
        hint: >
          If this article covers a subtopic of a pillar article, enter here the slug (URL identifier)
          of the pillar article it belongs to. This creates automatic links between articles.
          Example: if the pillar is 'complete-hypertrophy-guide', write exactly 'complete-hypertrophy-guide'.
          Leave blank if this is an independent article.

      - label: "Related Articles (slugs)"
        name: "related"
        widget: "list"
        required: false
        default: []
        hint: >
          List of slugs (URL identifiers) of other site articles related to this one.
          These appear in the 'Read also' section at the end of the post.
          Write only the slug, not the full URL.
          Example: complete-hypertrophy-guide, best-supplements-2026.

      - label: "Tags (keywords)"
        name: "tags"
        widget: "list"
        required: false
        default: []
        hint: >
          Words or phrases describing the article content, separated by commas.
          Help organise content internally.
          Examples: hypertrophy, training, muscle, nutrition.

      - label: "Show ads in this article?"
        name: "ad_slots_enabled"
        widget: "boolean"
        default: true
        hint: >
          When enabled, Google AdSense may display ads throughout the article.
          Disable only if the article is not suitable for ads or on special pages.

      - label: "Show affiliate links disclosure?"
        name: "affiliate_disclosure"
        widget: "boolean"
        default: false
        hint: >
          Enable if the article contains affiliate links (links that earn a commission when the reader buys something).
          The disclosure is legally required in many countries and increases reader trust.
          Leave disabled if the article has no affiliate links.

      - label: "FAQ — Frequently Asked Questions (optional)"
        name: "faq"
